name: sync-google-ads

on:
  schedule:
    - cron: '30 9,15,21 * * *'  # 06h30, 12h30, 18h30 horário de Brasília (UTC-3)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Invocar Edge Function
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://ftmgmfdqdqxboiktxcoj.supabase.co/functions/v1/sync-google-ads" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}')

          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -n 1)

          echo "HTTP $STATUS"
          echo "$BODY"

          if [ "$STATUS" != "200" ]; then
            echo "::error::Sync falhou com HTTP $STATUS"
            exit 1
          fi
